# Keel backend — local stack. Infra always; api+worker under `--profile full`.
#   docker compose up -d postgres qdrant neo4j redis minio   # infra only
#   docker compose --profile full up --build                 # full stack

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-keel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-keel}
      POSTGRES_DB: ${POSTGRES_DB:-keel}
    ports: ["5432:5432"]
    volumes: ["postgres-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-keel}"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333", "6334:6334"]
    volumes: ["qdrant-data:/qdrant/storage"]
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-keelneo4j}
      NEO4J_server_memory_heap_max__size: 512m
    ports: ["7474:7474", "7687:7687"]
    volumes: ["neo4j-data:/data"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15

  redis:
    image: redis:7
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports: ["9000:9000", "9001:9001"]
    volumes: ["minio-data:/data"]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Creates the S3 bucket on first boot, then exits.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-minioadmin} ${S3_SECRET_KEY:-minioadmin} &&
      mc mb --ignore-existing local/${S3_BUCKET:-keel} &&
      echo 'bucket ready';
      "
    profiles: ["full"]

  api:
    build: .
    command: ["/app/entrypoint.sh"]
    env_file: [.env]
    environment:
      RUN_MIGRATIONS: "true"
    ports: ["8000:8000"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      qdrant: { condition: service_healthy }
      neo4j: { condition: service_healthy }
      minio: { condition: service_healthy }
    profiles: ["full"]

  worker:
    build: .
    command: ["celery", "-A", "app.celery_app.celery", "worker", "-Q", "ingestion", "-c", "4", "--loglevel=info"]
    env_file: [.env]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    profiles: ["full"]

volumes:
  postgres-data:
  qdrant-data:
  neo4j-data:
  minio-data:
