name: Docker Build

# Standalone Docker build verification gate (independent of the Trivy scan in
# security.yml). Catches Dockerfile / build breaks fast on pushes and PRs to main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docker-build:
    name: Build backend image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: keel-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
