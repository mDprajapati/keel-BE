name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint, type-check & test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      pull-requests: write  # post the coverage summary comment on PRs

    services:
      postgres:
        # Pin to a specific patch to prevent silent regressions from image updates.
        image: postgres:16.9
        env:
          POSTGRES_USER: keel
          POSTGRES_PASSWORD: keel
          POSTGRES_DB: keel_test
        options: >-
          --health-cmd "pg_isready -U keel"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Cache mypy
        uses: actions/cache@v4
        with:
          path: backend/.mypy_cache
          key: mypy-${{ runner.os }}-py3.12-${{ hashFiles('backend/pyproject.toml') }}
          restore-keys: mypy-${{ runner.os }}-py3.12-

      - name: Install dependencies
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Ruff lint
        working-directory: backend
        run: ruff check app/ tests/

      - name: Ruff format check
        working-directory: backend
        run: ruff format --check app/ tests/

      - name: Mypy type check
        working-directory: backend
        run: mypy app/ --ignore-missing-imports

      - name: Run Alembic migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://keel:keel@localhost:5432/keel_test
        run: alembic upgrade head

      - name: Run tests with coverage
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://keel:keel@localhost:5432/keel_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-test-secret-key-not-used-in-production
          # Provider calls are mocked in tests; a dummy key keeps settings happy.
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY != '' && secrets.OPENAI_API_KEY || 'sk-ci-dummy' }}
          STORAGE_BACKEND: "local"
          STORAGE_LOCAL_PATH: "./var/uploads"
        # Full suite (no -x) so coverage is measured across all tests.
        run: |
          pytest tests/ -q \
            --cov=app \
            --cov-branch \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml
