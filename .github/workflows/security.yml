name: Security

# DevSecOps stack: Semgrep + Bandit (SAST), pip-audit (deps), gitleaks (secrets),
# Trivy (container). OSS-tier jobs always run. Snyk / SonarQube are opt-in via repo
# variables (Settings -> Variables): set ENABLE_SNYK / ENABLE_SONARQUBE = "true"
# and add the matching secrets. Runs on PRs to main and every Monday 02:00 UTC.
on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 2 * * 1"

jobs:
  sast:
    name: Static analysis (Semgrep + bandit)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install security tools
        run: pip install semgrep bandit
      - name: Semgrep SAST scan
        run: |
          semgrep --config=auto --error \
            --max-memory 4000 --jobs 2 \
            --exclude 'tests/' --exclude 'migrations/' \
            backend/app/
      - name: Bandit SAST scan (OSS complement)
        working-directory: backend
        run: |
          bandit -r app/ -f json -o bandit-report.json || true
          bandit -r app/ --severity-level medium
      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: backend/bandit-report.json

  dependency-audit:
    name: Dependency vulnerability scan (pip-audit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pip-audit
        run: |
          pip install --upgrade pip
          pip install pip-audit
      - name: Audit dependencies
        working-directory: backend
        run: |
          pip install -e .
          # --skip-editable: don't query PyPI for keel-backend itself (unpublished).
          pip-audit --skip-editable

  secret-scan:
    name: Secret detection (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for gitleaks
      - name: Install gitleaks
        run: |
          VERSION=8.30.1
          curl -sSfL -o gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz"
          tar -xzf gitleaks.tar.gz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
      - name: Run gitleaks
        run: gitleaks detect --source=. --redact

  container-scan:
    name: Container image scan (Trivy)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc \
            /usr/local/.ghcup /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
            /usr/share/swift "${AGENT_TOOLSDIRECTORY}"
          sudo apt-get clean
          docker system prune -af --volumes
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build image for scanning
        run: docker build -t keel-backend:scan .
      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.cache/trivy
          key: trivy-db-${{ github.run_id }}
          restore-keys: trivy-db-
      - name: Run Trivy vulnerability scanner
        # Pinned (NOT @master) — 0.0.1-0.34.2 tags were force-pushed to malware 2026-03-19.
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: keel-backend:scan
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          cache-dir: ${{ github.workspace }}/.cache/trivy

  snyk:
    name: Dependency scan (Snyk)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ vars.ENABLE_SNYK == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend deps
        working-directory: backend
        run: pip install -e .
      - name: Run Snyk
        uses: snyk/actions/python-3.10@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --severity-threshold=high --file=backend/pyproject.toml

  sonarqube:
    name: Quality + security gate (SonarQube)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ vars.ENABLE_SONARQUBE == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
